# 网络联机五子棋 - 服务器配置文件

# ========================================
# 服务器配置
# ========================================
server.port=8888
server.ip=0.0.0.0
server.thread_pool_size=4

# ========================================
# MySQL数据库配置
# ========================================
mysql_host=localhost
mysql_port=3306
mysql_database=gomoku_db
mysql_user=root
mysql_password=
mysql_connection_pool_size=10

# ========================================
# Redis缓存配置
# ========================================
redis_host=127.0.0.1
redis_port=6379
redis_password=
redis_db_index=0

# ========================================
# 日志配置
# ========================================
log.level=INFO
log.file_path=logs/gomoku_server.log
log.max_file_size=100MB
log.max_files=10

# ========================================
# 游戏配置
# ========================================
game.match_timeout=300          # 匹配超时时间（秒）
game.move_timeout=60            # 落子超时时间（秒）
game.max_spectators=10          # 最大观战者数量
game.room_cleanup_interval=3600 # 房间清理间隔（秒）

# ========================================
# 聊天配置
# ========================================
chat.max_message_length=200     # 最大消息长度
chat.max_history_size=100       # 最大历史消息数量
chat.sensitive_words_filter=true # 敏感词过滤

# ========================================
# 心跳配置
# ========================================
heartbeat.interval=30           # 心跳间隔（秒）
heartbeat.timeout=90            # 心跳超时（秒）